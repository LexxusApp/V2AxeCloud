    <script>
      (function () {
        if (!('serviceWorker' in navigator)) return;

        var attempts = parseInt(sessionStorage.getItem('axecloud_marketing_redirect_attempts') || '0', 10);

        function purgeAppServiceWorker(reloadAfter) {
          return navigator.serviceWorker.getRegistrations().then(function (regs) {
            var hasSw = regs.length > 0 || !!navigator.serviceWorker.controller;
            if (!hasSw) return false;

            if (reloadAfter) {
              sessionStorage.setItem('axecloud_marketing_redirect_attempts', String(attempts + 1));
            }

            return Promise.all(regs.map(function (r) { return r.unregister(); })).then(function () {
              if ('caches' in window) {
                return caches.keys().then(function (keys) {
                  return Promise.all(keys.map(function (k) { return caches.delete(k); }));
                });
              }
            }).then(function () {
              if (!reloadAfter) return;
              var u = new URL(location.href);
              ['_reload', '_swfix', '_nocache', '_boot'].forEach(function (k) {
                while (u.searchParams.has(k)) u.searchParams.delete(k);
              });
              location.replace(u.pathname + u.search + u.hash);
            }).then(function () { return true; });
          });
        }

        if (attempts >= 3) {
          void purgeAppServiceWorker(false);
          return;
        }

        void purgeAppServiceWorker(true);
      })();
    </script>
