name: Secret scan

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "17 4 * * 1"

permissions:
  contents: read

jobs:
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout completo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Bloquear arquivos de sessao versionados
        shell: bash
        run: |
          if git ls-files | grep -E '(^|/)(auth[_-]?info|sessions?)/.*(creds|session).*\.json$'; then
            echo "Arquivo de sessao sensivel encontrado no Git."
            exit 1
          fi

      - name: Verificar segredos no codigo e historico
        shell: bash
        run: |
          docker run --rm \
            -e GIT_CONFIG_COUNT=1 \
            -e GIT_CONFIG_KEY_0=safe.directory \
            -e GIT_CONFIG_VALUE_0=/repo \
            -v "$GITHUB_WORKSPACE:/repo" \
            ghcr.io/gitleaks/gitleaks:v8.30.1 \
            git /repo --config=/repo/.gitleaks.toml --redact --verbose
