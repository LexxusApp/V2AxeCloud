    <style>

      #axecloud-boot {

      #axecloud-boot .spinner {

        margin-bottom: 1rem;
        border: 4px solid rgba(245, 158, 11, 0.2);
        border-top-color: #f59e0b;
        border-radius: 50%;
        animation: axecloud-spin 0.8s linear infinite;
      }
      #axecloud-boot p {
        margin: 0;
        font-family: system-ui, sans-serif;
        font-size: 0.875rem;
        font-weight: 500;
        letter-spacing: 0.025em;
        color: #a3a3a3;
        animation: axecloud-pulse 1.5s ease-in-out infinite;
      }
      @keyframes axecloud-spin {
        to {
          transform: rotate(360deg);
        }
      }
      @keyframes axecloud-pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.55;
        }
      }
      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }
    </style>
    <script>
      (function () {
        var RETRY_KEY = 'axecloud_stale_boot_retries';
        var MAX_RETRIES = 3;

        function hardRefreshFromNetwork() {
          try {
            var attempts = parseInt(sessionStorage.getItem(RETRY_KEY) || '0', 10) + 1;
            if (attempts > MAX_RETRIES) return;
            sessionStorage.setItem(RETRY_KEY, String(attempts));
          } catch (e) {
            return;
          }
          var bust = '_boot=' + Date.now();
          var search = location.search ? location.search + '&' + bust : '?' + bust;
          location.replace((location.pathname || '/') + search + location.hash);
        }

        window.addEventListener(
          'error',
          function (ev) {
            var target = ev.target;
            if (!target || (target.tagName !== 'SCRIPT' && target.tagName !== 'LINK')) return;
            var url = target.src || target.href || '';
            if (url.indexOf('/assets/') !== -1) hardRefreshFromNetwork();
          },
          true
        );

        window.setTimeout(function () {
          if (document.getElementById('axecloud-boot')) hardRefreshFromNetwork();
        }, 10000);
      })();
    </script>
