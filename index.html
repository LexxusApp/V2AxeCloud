    <script>
      (function () {
        var RETRY_KEY = 'axecloud_stale_boot_retries';
        var MAX_RETRIES = 3;

        function hardRefreshFromNetwork() {
          try {
            var attempts = parseInt(sessionStorage.getItem(RETRY_KEY) || '0', 10) + 1;
            if (attempts > MAX_RETRIES) return;
            sessionStorage.setItem(RETRY_KEY, String(attempts));
          } catch (e) {
            return;
          }
          var bust = '_boot=' + Date.now();
          var search = location.search ? location.search + '&' + bust : '?' + bust;
          location.replace((location.pathname || '/') + search + location.hash);
        }

        window.addEventListener(
          'error',
          function (ev) {
            var target = ev.target;
            if (!target || (target.tagName !== 'SCRIPT' && target.tagName !== 'LINK')) return;
            var url = target.src || target.href || '';
            if (url.indexOf('/assets/') !== -1) hardRefreshFromNetwork();
          },
          true
        );

        window.setTimeout(function () {
          var root = document.getElementById('root');
          if (root && root.childElementCount === 0) hardRefreshFromNetwork();
        }, 20000);
      })();
    </script>
