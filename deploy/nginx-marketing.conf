server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json text/plain image/svg+xml;
    gzip_min_length 256;

    # Servir /rota/index.html sem 301 para barra final (evita loop com Caddy)
    absolute_redirect off;

    # Typo comum no Search Console: sitemap.xm → sitemap.xml
    location = /sitemap.xm {
        return 301 /sitemap.xml;
    }

    location /api/ {
        return 404;
    }

    location /m-assets/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    location /screenshots/ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        try_files $uri =404;
    }

    # Resumo leve no caminho crítico; permite cache na CDN com revalidação em segundo plano.
    location = /diretorio-cidades.json {
        expires 10m;
        add_header Cache-Control "public, max-age=600, stale-while-revalidate=86400";
        try_files $uri =404;
    }

    # Snapshot completo só é solicitado perto do mapa e pode permanecer mais tempo na borda.
    location = /diretorio-snapshot.json {
        expires 1h;
        add_header Cache-Control "public, max-age=3600, stale-while-revalidate=86400";
        try_files $uri =404;
    }

    # Payload geográfico compacto: abre o mapa sem baixar os dados completos dos cards.
    location = /terreiros/mapa.json {
        expires 1h;
        add_header Cache-Control "public, max-age=3600, stale-while-revalidate=86400";
        try_files $uri =404;
    }

    location ~* \.(png|jpg|jpeg|gif|webp|ico|svg|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        try_files $uri =404;
    }

    location / {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        # index.html da pasta ANTES de $uri — evita 301 para barra final (loop com Caddy)
        # O shell React preserva rotas públicas dinâmicas que ainda não foram pré-renderizadas.
        try_files $uri/index.html $uri /__react_shell.html;
    }

    # Perfil público dinâmico no visual cinematográfico. O slug é lido no navegador;
    # crawlers continuam recebendo o HTML SEO renderizado pela API no proxy externo.
    location ~ ^/terreiro/[^/]+/?$ {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        try_files /terreiro/index.html =404;
    }

    location = /__react_shell.html {
        internal;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }
}
