server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json text/plain image/svg+xml;
    gzip_min_length 256;

    # Servir /rota/index.html sem 301 para barra final (evita loop com Caddy)
    absolute_redirect off;

    # Typo comum no Search Console: sitemap.xm → sitemap.xml
    location = /sitemap.xm {
        return 301 /sitemap.xml;
    }

    location /api/ {
        return 404;
    }

    location /m-assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location ~* \.(png|jpg|jpeg|gif|webp|ico|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    location / {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        # index.html da pasta ANTES de $uri — evita 301 para barra final (loop com Caddy)
        try_files $uri/index.html $uri /index.html;
    }
}
