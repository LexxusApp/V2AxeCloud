services:
  app:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args:
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
        VITE_VAPID_PUBLIC_KEY: ${VITE_VAPID_PUBLIC_KEY:-}
    restart: unless-stopped
    env_file: ../.env
    environment:
      NODE_ENV: production
      VERCEL: ""
      EVOLUTION_API_BASE_URL: http://evolution:8080
    depends_on:
      evolution:
        condition: service_started
    networks:
      - web

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - web

  evolution-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: evolution
      POSTGRES_PASSWORD: ${EVOLUTION_DB_PASSWORD}
      POSTGRES_DB: evolution
    volumes:
      - evolution_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evolution -d evolution"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - web

  evolution:
    # atendai/evolution-api parou em v2.2.3; imagem oficial atual: evoapicloud (QR/pairing corrigidos)
    image: evoapicloud/evolution-api:v2.3.7
    restart: unless-stopped
    env_file: ../.env
    environment:
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY}
      SERVER_URL: ${EVOLUTION_SERVER_URL:-https://axecloud.com.br}
      NODE_OPTIONS: "--dns-result-order=ipv4first"
      DATABASE_ENABLED: "true"
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://evolution:${EVOLUTION_DB_PASSWORD}@evolution-db:5432/evolution?schema=public
      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: redis://redis:6379/6
      CACHE_REDIS_PREFIX_KEY: evolution
      CACHE_LOCAL_ENABLED: "false"
      QRCODE_LIMIT: "30"
      QRCODE_COLOR: "#175197"
      # Safari costuma parear melhor no fluxo "código no celular" que Chrome/Desktop
      CONFIG_SESSION_PHONE_CLIENT: Safari
      CONFIG_SESSION_PHONE_NAME: Safari
    volumes:
      - evolution_data:/evolution/instances
    depends_on:
      redis:
        condition: service_healthy
      evolution-db:
        condition: service_healthy
    networks:
      - web

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      ACME_EMAIL: ${ACME_EMAIL}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app
    networks:
      - web

networks:
  web:

volumes:
  evolution_pg:
  evolution_data:
  caddy_data:
  caddy_config:
