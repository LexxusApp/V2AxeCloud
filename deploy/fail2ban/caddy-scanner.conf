# fail2ban — scanners no log JSON do Caddy
# Usa Cf-Connecting-Ip (IP real do visitante via Cloudflare), não remote_ip (edge CF).
# Conta 403 (CrowdSec/AppSec) e 404 (regra @scanners do Caddyfile).
[Definition]
failregex = "uri":"/\.env[^"]*".*"Cf-Connecting-Ip":\["<HOST>"\].*"status":(?:403|404)
            "uri":"/\.git[^"]*".*"Cf-Connecting-Ip":\["<HOST>"\].*"status":(?:403|404)
            "uri":"/wp-admin[^"]*".*"Cf-Connecting-Ip":\["<HOST>"\].*"status":(?:403|404)
            "uri":"/wp-login\.php".*"Cf-Connecting-Ip":\["<HOST>"\].*"status":(?:403|404)
            "uri":"/phpmyadmin[^"]*".*"Cf-Connecting-Ip":\["<HOST>"\].*"status":(?:403|404)
            "uri":"/pma[^"]*".*"Cf-Connecting-Ip":\["<HOST>"\].*"status":(?:403|404)
            "uri":"/xmlrpc\.php".*"Cf-Connecting-Ip":\["<HOST>"\].*"status":(?:403|404)
            "uri":"/vendor/phpunit[^"]*".*"Cf-Connecting-Ip":\["<HOST>"\].*"status":(?:403|404)
            "uri":"/actuator[^"]*".*"Cf-Connecting-Ip":\["<HOST>"\].*"status":(?:403|404)
ignoreregex = "Cf-Connecting-Ip":\["(127\.0\.0\.1|::1)"\]
